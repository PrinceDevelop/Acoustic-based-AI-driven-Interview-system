{% extends "base.html" %}

{% block title %}Login - AI Interview System{% endblock %}

{% block content %}
<div class="glass-card">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Log in to your AI interview workspace</p>

    <!-- Notification system for errors/messages -->
    <div id="notification-area"></div>

    <form action="/login_user" method="POST">
        <div class="form-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="form-group">
            <input id="password" name="password" type="password" placeholder="Password" required>
        </div>

        <label class="checkbox-group">
            <input type="checkbox" onclick="togglePassword()"> 
            Show Password
        </label>

        <button type="submit" class="btn">Login Securely</button>
    </form>

    <div class="auth-links">
        <p>Don't have an account? <a href="/signup">Sign up here</a></p>
        <p style="margin-top: 10px;"><a href="/reset">Forgot Password?</a></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg) {
        document.getElementById("notification-area").innerHTML = `<div class="notification">${msg}</div>`;
        window.history.replaceState({}, document.title, "/");
    }

    function togglePassword() {
        let pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
